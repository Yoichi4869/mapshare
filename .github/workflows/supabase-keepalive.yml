name: Supabase Keepalive

on:
  schedule:
    # 5日ごとに実行（UTC 0:00 = JST 9:00）
    - cron: '0 0 */5 * *'
  workflow_dispatch: # 手動実行も可能

jobs:
  keepalive:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

    steps:
      - name: Ping Supabase (firewood_locations)
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "$SUPABASE_URL/rest/v1/firewood_locations?select=id&limit=1" \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY")
          echo "firewood_locations ping: $STATUS"
          [ "$STATUS" = "200" ] || exit 1

      - name: Ping Supabase (sake_locations)
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "$SUPABASE_URL/rest/v1/sake_locations?select=id&limit=1" \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY")
          echo "sake_locations ping: $STATUS"
          [ "$STATUS" = "200" ] || exit 1

      - name: Ping Supabase (beer_locations)
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "$SUPABASE_URL/rest/v1/beer_locations?select=id&limit=1" \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY")
          echo "beer_locations ping: $STATUS"
          [ "$STATUS" = "200" ] || exit 1
