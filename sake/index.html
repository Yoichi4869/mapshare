<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>日本酒マップ</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="manifest" href="/manifest.json" />
</head>

<body>
  <header>
    <div class="title">🍶 日本酒マップ</div>

    <div class="buttons">
      <button id="btnReload" class="icon-btn-left" type="button">⟳</button>
      <button id="btnNew" class="main-btn" type="button">＋ 新規登録</button>
      <button id="btnHelp" class="icon-btn-right" type="button">?</button>
    </div>
  </header>

  <!-- フィルターボタン + フィルターパネル -->
  <div class="filter-wrapper" id="filterWrapper">
  <button id="btnFilter" class="filter-btn" type="button">
    <svg class="filter-icon" width="18" height="18" viewBox="0 0 24 24" fill="white" aria-hidden="true">
      <path d="M3 4h18l-7 8v6l-4 2v-8z"/>
    </svg>
    フィルター
  </button>

    <div id="filterPanel" class="filter-panel">
      <div class="filter-header"></div>

      <label class="fld">
        <span>清酒区分</span>
        <select id="filterSeishu">
          <option value="">すべての区分</option>
          <option value="junmai">純米酒</option>
          <option value="ginjo">吟醸酒</option>
          <option value="honjozo">本醸造酒</option>
        </select>
      </label>

      <div class="filter-body">
        <label class="fld">
          <span>日本酒の種類</span>
          <select id="filterTaste">
            <option value="">すべての種類</option>
            <option value="dry">辛口傾向</option>
            <option value="sweet">甘口傾向</option>
            <option value="fruity">フルーティー</option>
            <option value="rich">濃醇</option>
            <option value="light">淡麗</option>
          </select>
        </label>

        <label class="fld">
          <span>キーワード検索</span>
          <input
            id="filterKeyword"
            type="text"
            placeholder="酒蔵名・都道府県で検索"
          />
        </label>

        <div class="actions">
          <button id="btnSearch" class="btn2 primary" type="button">🔍 検索</button>
          <button id="btnClearFilter" class="btn2 ghost" type="button">× クリア</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 地図 -->
  <div id="map"></div>

  <!-- トースト -->
  <div id="toast" class="toast" hidden></div>

  <!-- 新規登録モーダル -->
  <div id="modalOverlay" class="overlay hidden" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal-header">
        <div class="modal-title" id="modalTitle">＋ 新規販売場所の登録</div>
        <button id="btnModalClose" class="modal-close" type="button" aria-label="閉じる">×</button>
      </div>

      <form id="formSubmit" class="modal-body">
        <label class="fld">
          <span>酒蔵名 <em>*</em></span>
          <input name="name" required maxlength="20" placeholder="例：○○酒蔵 など（20文字まで）" />
        </label>

        <label class="fld">
          <span>代表銘柄（任意）</span>
          <input name="items" maxlength="60" placeholder="例：獺祭／賀茂鶴／…など" />
        </label>

        <label class="fld">
          <span>清酒区分 <em>*</em></span>
          <select name="seishu" required>
            <option value="" selected>選択してください</option>
            <option value="junmai">純米酒</option>
            <option value="ginjo">吟醸酒</option>
            <option value="honjozo">本醸造酒</option>

          </select>
        </label>

        <label class="fld">
          <span>種類 <em>*</em></span>
          <select name="taste" required>
            <option value="" selected>選択してください</option>
            <option value="dry">辛口傾向</option>
            <option value="sweet">甘口傾向</option>
            <option value="fruity">フルーティー</option>
            <option value="rich">濃醇</option>
            <option value="light">淡麗</option>
          </select>
        </label>

        <label class="fld">
          <span>価格（任意）</span>
          <input name="price" inputmode="numeric" maxlength="12" placeholder="例：700" />
        </label>

        <label class="fld">
          <span>公式サイトURL（任意）</span>
          <input name="website" type="url" maxlength="200" placeholder="例：https://example.jp" />
        </label>

        <div class="row2">
          <label class="fld">
            <span>緯度 <em>*</em></span>
            <input name="lat" required inputmode="decimal" placeholder="例：35.681236" />
          </label>
          <label class="fld">
            <span>経度 <em>*</em></span>
            <input name="lng" required inputmode="decimal" placeholder="例：139.767125" />
          </label>
        </div>

        <div class="row2 buttons2">
          <button id="btnPickFromMap" class="btn2" type="button">📍 地図から選択</button>
          <button id="btnUseCurrent" class="btn2" type="button">➤ 現在地を取得</button>
        </div>

        <label class="fld">
          <span>備考</span>
          <textarea name="desc" maxlength="100" placeholder="営業時間、その他の情報など（100文字まで）"></textarea>
        </label>

        <div class="actions">
          <button id="btnCancelModal" class="btn2 ghost" type="button">キャンセル</button>
          <button class="btn2 primary" type="submit">💾 登録</button>
        </div>
      </form>
    </div>
  </div>

<!-- 詳細モーダル -->
<div id="detailOverlay" class="detail-overlay hidden" aria-hidden="true">
  <div class="detail-modal" role="dialog" aria-modal="true" aria-labelledby="detailTitle">
    <div class="detail-header">
      <div class="detail-header-title">詳細情報</div>
      <button id="btnDetailClose" class="detail-close" type="button" aria-label="閉じる">×</button>
    </div>

    <div class="detail-body">
      <div class="detail-section">
        <div class="detail-label">酒蔵名</div>
        <div id="detailName" class="detail-value">-</div>
      </div>

      <div class="detail-section">
        <div class="detail-label">日本酒の種類</div>
        <div id="detailTaste" class="detail-value">-</div>
      </div>

      <div class="detail-section">
        <div class="detail-label">清酒区分</div>
        <div id="detailSeishu" class="detail-value">-</div>
      </div>

      <div class="detail-section">
        <div class="detail-label">価格</div>
        <div id="detailPrice" class="detail-value">-</div>
      </div>

      <div class="detail-section">
        <div class="detail-label">位置情報</div>
        <div id="detailLatLng" class="detail-value">-</div>
      </div>

      <div class="detail-section">
        <div class="detail-label">備考</div>
        <div id="detailDesc" class="detail-value">-</div>
      </div>

      <div class="detail-actions">
        <a id="detailMapLink" class="detail-btn ghost" href="#" target="_blank" rel="noopener noreferrer">Googleマップで開く</a>
        <a id="detailWebsiteLink" class="detail-btn primary hidden" href="#" target="_blank" rel="noopener noreferrer">公式サイトを見る</a>
      </div>
    </div>
  </div>
</div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
